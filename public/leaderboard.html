<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | ANSH E-LEARNING</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ansh: { blue: '#1b1db9', gold: '#fbbf24', silver: '#94a3b8', bronze: '#d97706' }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s; 
            overflow-x: hidden;
        }

        h1, h2, h3, h4, button, a, p, span, select, label { 
            letter-spacing: 0.08em; 
            font-style: normal !important; 
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
        }
        .dark .glass-card { 
            background: rgba(15, 23, 42, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        /* Sidebar Responsive Logic */
        #sidebar {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-100%);
            z-index: 50;
        }
        @media (min-width: 1024px) {
            #sidebar { transform: translateX(0); }
        }
        .sidebar-open #sidebar { transform: translateX(0); }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 40;
        }
        .sidebar-open .sidebar-overlay { display: block; }

        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover, .sidebar-item.active { 
            background: rgba(27, 29, 185, 0.08); 
            color: #1b1db9; 
            border-right: 4px solid #1b1db9; 
        }
        .dark .sidebar-item:hover, .dark .sidebar-item.active { 
            background: rgba(255,255,255,0.05); 
            color: #60a5fa; 
            border-right-color: #60a5fa; 
        }

        .podium-1 { height: 160px; background: #fbbf24; }
        .podium-2 { height: 120px; background: #cbd5e1; }
        .podium-3 { height: 100px; background: #d97706; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- Mobile Overlay -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800">
        <div class="max-w-[1600px] mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <span class="text-xs font-black uppercase tracking-[0.2em] text-ansh-blue dark:text-blue-400">Hall of Fame</span>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleTheme()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 hover:scale-105 transition-all">
                    <i id="theme-icon" data-lucide="moon" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="flex pt-16">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:sticky top-16 left-0 w-64 bg-white dark:bg-slate-900 border-r border-slate-100 dark:border-slate-800 h-[calc(100vh-16px)]">
            <div class="p-6">
                <nav class="space-y-1">
                    <a href="userDashboard.html" class="sidebar-item flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500">
                        <i data-lucide="layout" class="w-4 h-4 mr-3"></i> Home
                    </a>
                    <a href="profileSettings.html" class="sidebar-item flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500">
                        <i data-lucide="user" class="w-4 h-4 mr-3"></i> My Profile
                    </a>
                    <a href="noticeboard.html" class="sidebar-item flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500">
                        <i data-lucide="bell" class="w-4 h-4 mr-3"></i> Notice Board
                    </a>
                    <a href="examination.html" class="sidebar-item flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500">
                        <i data-lucide="file-text" class="w-4 h-4 mr-3"></i> Examination
                    </a>
                    <a href="leaderboard.html" class="sidebar-item active flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">
                        <i data-lucide="award" class="w-4 h-4 mr-3"></i> Leaderboard
                    </a>
                    <a href="doubtportal.html" class="sidebar-item flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500">
                        <i data-lucide="help-circle" class="w-4 h-4 mr-3"></i> Doubt Portal
                    </a>
                    <button onclick="handleSignOut()" class="w-full text-left sidebar-item flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10">
                        <i data-lucide="power" class="w-4 h-4 mr-3"></i> Logout
                    </button>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 md:p-12">
            <div class="max-w-5xl mx-auto">
                
                <header class="flex flex-col md:flex-row justify-between items-center gap-8 mb-16">
                    <div class="text-center md:text-left">
                        <h1 class="text-4xl font-black uppercase tracking-tighter mb-2 leading-none text-slate-900 dark:text-white">Class <span id="class-label">--</span> Ranking</h1>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Merit Statistics</p>
                    </div>
                    
                    <!-- Unified Exam Filter -->
                    <div class="glass-card px-8 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 flex items-center gap-4 shadow-xl">
                        <i data-lucide="filter" class="w-3.5 h-3.5 text-ansh-blue"></i>
                        <select id="exam-filter" class="bg-transparent text-[10px] font-black uppercase text-ansh-blue dark:text-blue-400 outline-none cursor-pointer pr-4 min-w-[180px]">
                            <option value="all">Cumulative Performance</option>
                        </select>
                    </div>
                </header>

                <!-- Top 3 Visual Podium -->
                <div id="podium" class="grid grid-cols-3 gap-4 mb-16 items-end min-h-[220px]">
                    <!-- Injected via JS -->
                </div>

                <!-- Complete Ranking List -->
                <div id="rank-list" class="space-y-4">
                    <div class="py-24 text-center opacity-30">
                        <div class="animate-spin h-10 w-10 border-4 border-ansh-blue border-t-transparent rounded-full mx-auto mb-4"></div>
                        <p class="text-[10px] font-black uppercase tracking-widest">Compiling Records...</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- CONFIGURATION & INITIALIZATION --- //PUT YOUR FIREBASE CONFIG DETAILS HERE
        const firebaseConfig = { apiKey: " ", 
                                authDomain: " ", 
                                projectId: " ", 
                                storageBucket: "  ", 
                                messagingSenderId: " ", 
                                appId: " " };
        const app = initializeApp(config); 
        const auth = getAuth(app); 
        const db = getFirestore(app);
        const appId = 'ansh-elearning-platform';

        let studentClass = null;
        let allSubmissions = [];

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "studentlogin.html"; return; }
            const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
            if (snap.exists()) {
                studentClass = snap.data().class || "10";
                document.getElementById('class-label').innerText = studentClass;
                fetchData(user.uid);
            }
        });

        window.toggleSidebar = () => document.body.classList.toggle('sidebar-open');

        window.handleSignOut = () => {
            if(confirm("Securely terminate session?")) {
                signOut(auth).then(() => window.location.href = "studentlogin.html");
            }
        };

        function fetchData(myUid) {
            // Path Rule 1: /artifacts/{appId}/public/data/exam_submissions
            const path = `artifacts/${appId}/public/data/exam_submissions`;
            onSnapshot(collection(db, path), (snap) => {
                allSubmissions = snap.docs.map(d => d.data()).filter(s => s.studentClass === studentClass);
                updateDropdownOptions();
                processAndRender(myUid);
            });
        }

        function updateDropdownOptions() {
            const filter = document.getElementById('exam-filter');
            const currentVal = filter.value;
            const uniqueExams = [...new Set(allSubmissions.map(s => s.examTitle))];
            
            filter.innerHTML = `<option value="all">Cumulative Performance</option>` + 
                uniqueExams.map(ex => `<option value="${ex}">${ex}</option>`).join('');
            
            filter.value = currentVal;
        }

        function processAndRender(myUid) {
            const filterValue = document.getElementById('exam-filter').value;
            const rankings = {};

            allSubmissions.forEach(sub => {
                // If filter is not 'all', skip submissions that don't match selected exam
                if (filterValue !== 'all' && sub.examTitle !== filterValue) return;

                if (!rankings[sub.studentUid]) {
                    rankings[sub.studentUid] = { 
                        name: sub.studentName || 'Anonymous Student', 
                        score: 0, 
                        attempts: 0, 
                        uid: sub.studentUid 
                    };
                }
                rankings[sub.studentUid].score += sub.score;
                rankings[sub.studentUid].attempts++;
            });

            const sorted = Object.values(rankings).sort((a, b) => b.score - a.score);
            renderUI(sorted, myUid);
        }

        function renderUI(sorted, myUid) {
            const podiumCont = document.getElementById('podium');
            const listCont = document.getElementById('rank-list');
            podiumCont.innerHTML = ''; 
            listCont.innerHTML = '';

            // Podium (Top 3)
            const top3 = sorted.slice(0, 3);
            const podiumOrder = [1, 0, 2]; // Render 2nd, 1st, 3rd visually

            podiumOrder.forEach(idx => {
                const item = top3[idx];
                if (!item) {
                    podiumCont.innerHTML += `<div></div>`; // Placeholder
                    return;
                }
                const pClass = idx === 0 ? 'podium-1' : (idx === 1 ? 'podium-2' : 'podium-3');
                const medal = idx === 0 ? '🏆' : (idx === 1 ? '🥈' : '🥉');
                
                podiumCont.innerHTML += `
                    <div class="text-center animate-fade-in flex flex-col items-center">
                        <p class="text-[9px] font-black mb-3 uppercase truncate w-full px-2">${item.name}</p>
                        <div class="${pClass} w-full rounded-t-[2.5rem] flex flex-col items-center justify-center text-white shadow-2xl relative">
                            <span class="text-3xl mb-1">${medal}</span>
                            <span class="text-2xl font-black">${item.score}</span>
                            <span class="text-[8px] font-black uppercase opacity-60">Points</span>
                        </div>
                    </div>`;
            });

            // Rankings List
            sorted.forEach((item, idx) => {
                const isMe = item.uid === myUid;
                listCont.innerHTML += `
                    <div class="glass-card p-6 md:p-8 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 flex items-center justify-between transition-all group animate-fade-in ${isMe ? 'ring-2 ring-ansh-blue' : ''}">
                        <div class="flex items-center space-x-6">
                            <span class="w-8 font-black text-slate-300 dark:text-slate-700 text-lg italic">#${idx + 1}</span>
                            <div>
                                <h4 class="font-black uppercase text-sm ${isMe ? 'text-ansh-blue' : ''}">${item.name} ${isMe ? '(YOU)' : ''}</h4>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">${item.attempts} Assessments Sync'd</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black text-slate-900 dark:text-white">${item.score}</span>
                            <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Total</p>
                        </div>
                    </div>`;
            });

            if (sorted.length === 0) {
                listCont.innerHTML = `<div class="py-24 text-center glass-card rounded-[3rem] border border-dashed border-slate-200 dark:border-slate-800 uppercase font-black text-[10px] text-slate-400 tracking-widest">No data available for the selected filter.</div>`;
            }
            lucide.createIcons();
        }

        // Theme Toggle Logic
        window.toggleTheme = () => {
            const isD = document.documentElement.classList.toggle('dark');
            localStorage.setItem('ansh_theme', isD ? 'dark' : 'light');
            const icon = document.getElementById('theme-icon');
            icon.setAttribute('data-lucide', isD ? 'sun' : 'moon');
            lucide.createIcons();
        };

        if (localStorage.getItem('ansh_theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        document.getElementById('exam-filter').onchange = () => processAndRender(auth.currentUser.uid);
        lucide.createIcons();
    </script>
</body>
</html>
